<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Praxis</title>
<style>
  :root { --bg:#0e1117; --card:#171c26; --line:#2a3140; --tx:#e6e9ef;
          --dim:#8b93a3; --acc:#4da3ff; --ok:#3ecf8e; --bad:#ff6b6b; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--tx);
         font:15px/1.5 -apple-system,"Segoe UI",Roboto,sans-serif; padding:20px; }
  h1 { font-size:20px; } .sub { color:var(--dim); font-size:13px; margin-bottom:18px; }
  .grid { display:grid; grid-template-columns:360px 1fr; gap:16px; max-width:1150px; }
  .card { background:var(--card); border:1px solid var(--line);
          border-radius:8px; padding:16px; }
  h2 { font-size:14px; color:var(--dim); font-weight:600; margin-bottom:10px;
       text-transform:uppercase; letter-spacing:.04em; }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 4px; }
  button { background:var(--acc); color:#03101f; border:none; border-radius:8px;
           padding:10px 18px; font-weight:600; font-size:15px; cursor:pointer; }
  button:disabled { background:var(--line); color:var(--dim); cursor:default; }
  button.go { background:var(--ok); }
  button.stop { background:var(--bad); color:#fff; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--tx); }
  .userrow { display:flex; gap:10px; align-items:center; margin-bottom:12px; }
  .userrow label { color:var(--dim); font-size:13px; flex:none; }
  .userrow input { flex:1; background:var(--bg); border:1px solid var(--line);
                   border-radius:8px; color:var(--tx); padding:9px 12px; font-size:15px; }
  .userrow input:focus { outline:none; border-color:var(--acc); }
  .live { display:flex; gap:24px; align-items:baseline; margin-top:10px; }
  .timer { font:600 34px ui-monospace,monospace; }
  .gauge { font:600 20px ui-monospace,monospace; color:var(--acc); }
  .gauge small { color:var(--dim); font-size:12px; font-weight:400; }
  .camera-frame { position:relative; width:100%; aspect-ratio:16/9; overflow:hidden;
                  background:#000; border:1px solid var(--line); border-radius:8px; }
  img.cam { width:100%; height:100%; object-fit:cover; display:block; }
  canvas.result { width:100%; background:#000; border-radius:8px; display:block; }
  .live-badge { position:absolute; top:9px; left:9px; display:flex; align-items:center;
                gap:6px; padding:4px 8px; border-radius:999px; background:rgba(14,17,23,.84);
                color:var(--dim); font-size:11px; font-weight:700; }
  .live-badge i { width:7px; height:7px; border-radius:50%; background:var(--dim); }
  .live-badge.live { color:#fff; }
  .live-badge.live i { background:var(--bad); box-shadow:0 0 0 3px rgba(255,107,107,.18); }
  .scores { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .score { background:var(--bg); border:1px solid var(--line); border-radius:10px;
           padding:14px; text-align:center; }
  .score b { font-size:38px; display:block; line-height:1.1; }
  .score span { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .band { margin-top:8px; display:inline-block; padding:3px 10px; border-radius:999px;
          font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
  .band.very-high, .band.high { background:rgba(62,207,142,.18); color:var(--ok); }
  .band.moderate { background:rgba(255,190,80,.18); color:#ffbe50; }
  .band.low, .band.very-low { background:rgba(255,107,107,.18); color:var(--bad); }
  .band.unknown { background:var(--line); color:var(--dim); }
  .pctl { margin-top:6px; font-size:11px; color:var(--dim); }
  .explain { margin-top:14px; background:var(--bg); border:1px solid var(--line);
             border-radius:10px; padding:14px; }
  .quality { display:none; margin-bottom:12px; padding:11px 13px; border:1px solid var(--line);
             border-radius:8px; font-size:13px; }
  .quality.valid { display:block; color:var(--ok); border-color:rgba(62,207,142,.5); }
  .quality.invalid { display:block; color:var(--bad); border-color:rgba(255,107,107,.5); }
  .quality.unavailable { display:block; color:var(--dim); }
  .quality-head, .explain-h { display:flex; align-items:center; justify-content:space-between;
                              gap:12px; }
  .quality-head strong { font-size:14px; color:var(--tx); }
  .quality-head span { flex:none; font:600 13px ui-monospace,monospace; }
  .quality-meter { height:4px; margin:9px 0 7px; overflow:hidden; background:var(--line); }
  .quality-meter span { display:block; height:100%; width:0; background:currentColor; }
  .quality-detail { color:var(--dim); font-size:12px; }
  .explain-h { font-size:12px; color:var(--dim); margin-bottom:7px; }
  .ai-source { color:var(--dim); text-align:right; }
  .ai-source.llama { color:var(--ok); }
  #explainText { font-size:14px; line-height:1.55; }
  .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
  .metric { background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px; }
  .metric b { font-size:18px; display:block; } .metric span { color:var(--dim); font-size:12px; }
  .msg { font-size:13px; color:var(--dim); min-height:20px; margin-top:10px; }
  .ok { color:var(--ok); } .bad { color:var(--bad); }
  .legend { font-size:12px; color:var(--dim); margin-top:6px; }
  .legend b.k { display:inline-block; width:22px; height:3px; vertical-align:middle; margin-right:4px; }
</style>
</head>
<body>
<h1>Praxis</h1>

<div class="grid">
  <div class="card">
    <h2>Camera</h2>
    <div class="userrow">
      <label for="uname">Username</label>
      <input id="uname" placeholder="enter participant username" autocomplete="off"
             oninput="onUname()">
    </div>
    <div class="camera-frame">
      <img class="cam" id="cam" alt="Live QNX camera view" width="480" height="270">
      <div class="live-badge" id="liveBadge"><i></i><span>CONNECTING</span></div>
    </div>
    <div class="controls">
      <button class="go" onclick="startRun()" id="bstart" disabled>Start</button>
      <button class="stop" onclick="stopRun()" id="bstop" disabled>Stop</button>
      <button onclick="scoreRun()" id="bscore" disabled>Capture &amp; Score</button>
      <button class="ghost" onclick="resetRun()" id="breset">New run</button>
    </div>
    <div class="live">
      <span class="timer" id="timer">0.0s</span>
      <span class="gauge" id="gauge">— <small>°/s</small></span>
    </div>
    <div class="msg" id="msg">Live camera view. Press Start to begin.</div>
  </div>

  <div class="card">
    <h2>Result</h2>
    <div class="quality" id="imageQuality" role="status">
      <div class="quality-head"><strong id="qualityTitle"></strong><span id="qualityConfidence"></span></div>
      <div class="quality-meter"><span id="qualityFill"></span></div>
      <div class="quality-detail" id="qualityDetail"></div>
    </div>
    <div class="scores" id="scores" style="display:none">
      <div class="score"><b id="sAcc">—</b><span>accuracy</span>
        <div class="band unknown" id="bAcc">—</div>
        <div class="pctl" id="pAcc"></div></div>
      <div class="score"><b id="sStab">—</b><span>stability</span>
        <div class="band unknown" id="bStab">—</div>
        <div class="pctl" id="pStab"></div></div>
    </div>
    <canvas class="result" id="result" width="660" height="371"></canvas>
    <div class="legend">
      <b class="k" style="background:#4da3ff"></b>blue reference (detected)&nbsp;&nbsp;
      <b class="k" style="background:#ff6b6b"></b>red trace (detected)
    </div>
    <div class="metrics" id="metrics" style="display:none"></div>
    <div class="explain" id="explain" style="display:none">
      <div class="explain-h"><strong>On-device session analysis</strong><span class="ai-source" id="explainSrc"></span></div>
      <div id="explainText"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let sid = null, phase = "idle";
let t_go = null, timerIv = null, liveIv = null;
let previewOn = true;
let previewStreaming = false;

function msg(t, cls) { $("msg").innerHTML = `<span class="${cls||''}">${t}</span>`; }

async function api(path, body) {
  const r = await fetch(path, body !== undefined
    ? {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)}
    : undefined);
  return r.json();
}

function cameraState(label, live=false) {
  $("liveBadge").className = "live-badge" + (live ? " live" : "");
  $("liveBadge").querySelector("span").textContent = label;
}

const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

// The QNX process holds one viewfinder open and refreshes preview.bmp. The UI
// only reloads that file, avoiding repeated camera-open cycles.
async function previewLoop() {
  while (true) {
    if (previewOn && sid) {
      try {
        if (!previewStreaming) {
          cameraState("CONNECTING");
          const r = await api("/api/preview", {});
          if (!r || !r.ok) throw new Error("camera unavailable");
          previewStreaming = true;
          cameraState("LIVE", true);
        }
        await new Promise(resolve => {
          const im = new Image();
          im.onload = () => { $("cam").src = im.src; resolve(); };
          im.onerror = resolve;
          im.src = `/sessions/${sid}/preview.bmp?t=${Date.now()}`;
        });
      } catch (e) {
        previewStreaming = false;
        cameraState("RETRYING");
        await sleep(1000);
      }
    }
    await sleep(previewOn ? 160 : 300);
  }
}

async function newSession(username) {
  const r = await api("/api/session/new", {username: username || ""});
  sid = r.session_id;
  previewStreaming = false;
}

function uname() { return $("uname").value.trim(); }
function onUname() {
  // Start is only allowed with a username, and only when idle
  if (phase === "idle" || phase === "complete")
    $("bstart").disabled = uname() === "";
}

async function startRun() {
  if (uname() === "") return msg("Enter a username before starting.", "bad");
  $("bstart").disabled = true; $("uname").disabled = true;
  // bind this run to the username with a fresh session, then start
  await newSession(uname());
  msg("Hold the pen still at the start — calibrating IMU (2s)…");
  const r = await api("/api/go", {});
  if (!r.ok) { $("bstart").disabled = false; $("uname").disabled = false;
               return msg("Start failed: " + (r.error||""), "bad"); }
  phase = "recording"; t_go = Date.now();
  $("bstop").disabled = false;
  $("scores").style.display = "none"; $("metrics").style.display = "none";
  msg(`Recording — trace the blue pattern in red. (bias noise ${r.noise_dps}°/s)`, "ok");
  timerIv = setInterval(() => $("timer").textContent = ((Date.now()-t_go)/1000).toFixed(1)+"s", 100);
  liveIv = setInterval(async () => {
    const l = await fetch("/api/imu_live").then(x=>x.json());
    $("gauge").innerHTML = (l.gyro_mag==null?"—":l.gyro_mag.toFixed(1)) + " <small>°/s</small>";
  }, 300);
}

async function stopRun() {
  clearInterval(timerIv); clearInterval(liveIv);
  $("bstop").disabled = true;
  const r = await api("/api/stop", {});
  if (!r.ok) { $("bstop").disabled = false; return msg("Stop failed: " + (r.error||""), "bad"); }
  phase = "stopped";
  $("bscore").disabled = false;
  msg(`Stopped (${r.duration_s}s). <b>Lift the pen straight up and away</b>, then Capture &amp; Score.`, "ok");
}

async function scoreRun() {
  $("bscore").disabled = true;
  previewOn = false;
  previewStreaming = false;
  cameraState("CAPTURING");
  msg("Capturing, validating image on-device, and generating QNX AI analysis…");
  const r = await api("/api/score", {});
  if (!r.ok) { $("bscore").disabled = false; previewOn = true; previewStreaming = false;
               return msg("Scoring failed: " + (r.error||""), "bad"); }
  phase = "complete";
  cameraState("CAPTURED");
  renderResult(r.session);
  const st = await api("/api/state");
  drawOverlay(st);
  const fw = r.session._forward || {};
  const sent = fw.forwarded ? "sent to backend ✓"
             : (fw.reason === "no_backend_url" ? "saved locally (no backend configured)"
                                               : "backend unreachable — saved locally");
  msg(`Done for <b>${r.session.username}</b> — ${sent}. Press New run for another.`, "ok");
}

async function resetRun() {
  clearInterval(timerIv); clearInterval(liveIv);
  await newSession(uname());
  phase = "idle"; previewOn = true;
  $("uname").disabled = false;
  $("bstart").disabled = uname() === ""; $("bstop").disabled = true; $("bscore").disabled = true;
  $("timer").textContent = "0.0s"; $("gauge").innerHTML = "— <small>°/s</small>";
  $("scores").style.display = "none"; $("metrics").style.display = "none";
  $("explain").style.display = "none";
  $("imageQuality").className = "quality";
  cameraState("CONNECTING");
  clearCanvas();
  msg("Live camera view. Press Start to begin.");
}

// ---- results ----
const fmt = v => v==null ? "—" : v;
function setBand(id, b) {
  const el = $(id); b = b || "unknown";
  el.className = "band " + b.replace(/\s+/g, "-");
  el.textContent = b;
}
function setPctl(id, meas) {
  const el = $(id);
  if (!meas || meas.percentile == null) { el.textContent = "Percentile unavailable"; return; }
  const proto = meas.is_prototype ? " · prototype ref-set" : "";
  el.textContent = meas.percentile + "th percentile" + proto;
}
function renderResult(s) {
  const m = s.metrics, q = s.quality;
  const iq = q && q.image_quality;
  if (iq && iq.ok) {
    const pct = Math.round(iq.valid_probability * 100);
    if (iq.classification === "valid") {
      $("imageQuality").className = "quality valid";
      $("qualityTitle").textContent = "Capture accepted by on-device vision model";
    } else {
      $("imageQuality").className = "quality invalid";
      $("qualityTitle").textContent = "Repeat capture recommended";
    }
    $("qualityConfidence").textContent = `${pct}% valid`;
    $("qualityFill").style.width = `${Math.max(2, pct)}%`;
    $("qualityDetail").textContent = `${iq.model_version} · ${fmt(iq.inference_ms)}ms · QNX CPU`;
  } else {
    $("imageQuality").className = "quality unavailable";
    $("qualityTitle").textContent = "Image-quality model unavailable";
    $("qualityConfidence").textContent = "fallback";
    $("qualityFill").style.width = "0";
    $("qualityDetail").textContent = "Deterministic accuracy and stability scores are preserved.";
  }
  $("scores").style.display = "grid";
  $("sAcc").textContent = fmt(s.scores.accuracy);
  $("sStab").textContent = fmt(s.scores.stability);
  setBand("bAcc", s.scores.accuracy_band);
  setBand("bStab", s.scores.stability_band);
  setPctl("pAcc", s.percentiles && s.percentiles.accuracy);
  setPctl("pStab", s.percentiles && s.percentiles.stability);
  if (s.explanation && s.explanation.summary) {
    $("explain").style.display = "block";
    $("explainText").textContent = s.explanation.summary;
    const llama = s.explanation.source === "llama.cpp";
    $("explainSrc").className = "ai-source" + (llama ? " llama" : "");
    const runtime = llama ? `QNX llama.cpp · ${fmt(s.explanation.inference_ms)}ms`
                          : "deterministic fallback";
    $("explainSrc").textContent = runtime + (s.explanation.validated ? " · fact-validated" : "");
  }
  // Show deviations in mm from the fixed rig calibration, else px.
  const hasMM = m.mean_dev_mm != null;
  const meanDev = hasMM ? `${fmt(m.mean_dev_mm)}mm` : `${fmt(m.mean_dev_px)}px`;
  const maxDev  = hasMM ? `${fmt(m.max_dev_mm)}mm`  : `${fmt(m.max_dev_px)}px`;
  const scaleLbl = m.scale_px_per_mm == null ? "not set" : `${fmt(m.scale_px_per_mm)}px/mm`;
  $("metrics").style.display = "grid";
  $("metrics").innerHTML = `
    <div class="metric"><b>${meanDev}</b><span>mean deviation</span></div>
    <div class="metric"><b>${maxDev}</b><span>max deviation</span></div>
    <div class="metric"><b>${fmt(m.coverage_pct)}%</b><span>pattern covered</span></div>
    <div class="metric"><b>${fmt(m.completion_time_seconds)}s</b><span>task time</span></div>
    <div class="metric"><b>${fmt(m.gyro_rms_deg_s)}°/s</b><span>gyro RMS</span></div>
    <div class="metric"><b>${fmt(m.peak_angular_velocity_deg_s)}°/s</b><span>peak ang. vel.</span></div>
    <div class="metric"><b>${fmt(m.tremor_rms_deg_s)}°/s</b><span>tremor (jitter)</span></div>
    <div class="metric"><b>${fmt(q.imu_rate_hz)}Hz</b><span>IMU rate</span></div>
    <div class="metric"><b>${scaleLbl}</b><span>scale</span></div>`;
}

const rc = $("result"), rx = rc.getContext("2d");
function clearCanvas() { rx.fillStyle = "#000"; rx.fillRect(0,0,rc.width,rc.height); }
function drawPoly(pts, color, sx, sy) {
  if (!pts || pts.length < 2) return;
  rx.strokeStyle = color; rx.lineWidth = 3; rx.beginPath();
  pts.forEach((p,i) => i ? rx.lineTo(p[0]*sx,p[1]*sy) : rx.moveTo(p[0]*sx,p[1]*sy));
  rx.stroke();
}
function drawOverlay(st) {
  const fr = st.frame || [rc.width, rc.height];
  // fit the end photo (BMP) then overlay detected polylines in frame pixels
  const im = new Image();
  im.onload = im.onerror = () => {
    const sx = rc.width / fr[0], sy = rc.height / fr[1];
    rx.fillStyle = "#000"; rx.fillRect(0,0,rc.width,rc.height);
    try { rx.drawImage(im, 0, 0, rc.width, rc.height); } catch(e) {}
    drawPoly(st.reference, "#4da3ff", sx, sy);
    drawPoly(st.red, "#ff6b6b", sx, sy);
  };
  im.src = `/sessions/${sid}/end.bmp?t=` + Date.now();
}

clearCanvas();
newSession().then(previewLoop);
</script>
</body>
</html>
